name: Build macOS App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd macos
          xcodegen generate

      - name: Build with Xcode
        run: |
          cd macos
          xcodebuild -project SyncVault.xcodeproj -scheme SyncVault -configuration Release build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO

      - name: Create app bundle and DMG
        run: |
          BUILD_DIR=$(xcodebuild -project macos/SyncVault.xcodeproj -scheme SyncVault -configuration Release -showBuildSettings 2>/dev/null | grep " BUILT_PRODUCTS_DIR" | awk '{print $3}')
          hdiutil create -volname "SyncVault" -srcfolder "$BUILD_DIR/SyncVault.app" -ov -format UDZO SyncVault.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SyncVault-macOS
          path: SyncVault.dmg

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SyncVault.dmg
