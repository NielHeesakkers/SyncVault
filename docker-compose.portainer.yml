version: "3.8"

services:
  syncvault:
    image: ghcr.io/nielheesakkers/syncvault:latest
    container_name: syncvault
    ports:
      - "8080:8080"
      - "6690:6690"
    volumes:
      - syncvault-data:/data
      # Optional: store file chunks on a separate location (e.g. external drive)
      # Uncomment and change the path to use a custom storage location:
      # - /Volumes/Storage/syncvault-chunks:/data/chunks
    environment:
      - SYNCVAULT_JWT_SECRET=VERANDER-DIT-NAAR-EEN-LANG-RANDOM-WACHTWOORD
      - SYNCVAULT_HTTP_PORT=8080
      - SYNCVAULT_GRPC_PORT=6690
      - SYNCVAULT_SMTP_ENABLED=false
      - SYNCVAULT_SMTP_HOST=smtp.gmail.com
      - SYNCVAULT_SMTP_PORT=587
      - SYNCVAULT_SMTP_USER=
      - SYNCVAULT_SMTP_PASSWORD=
      - SYNCVAULT_SMTP_FROM=SyncVault <noreply@example.com>
    restart: unless-stopped

volumes:
  syncvault-data:
    driver: local
