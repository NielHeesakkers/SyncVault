version: "3.8"
services:
  syncvault:
    build: .
    ports:
      - "8080:8080"
      - "6690:6690"
    volumes:
      - syncvault-data:/data
    environment:
      - SYNCVAULT_JWT_SECRET=${SYNCVAULT_JWT_SECRET:-change-me-in-production}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
volumes:
  syncvault-data:
